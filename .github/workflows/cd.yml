# =============================================================================
# cd.yml
# Pipeline de CD que se ejecuta MANUALMENTE desde GitHub Actions.
# Despliega la infraestructura con terraform apply y actualiza Lambda y ECR.
# Solo debe ejecutarse desde la rama main después de un PR aprobado.
# =============================================================================

name: CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno de despliegue'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
  push:
    branches:
      - develop
jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Despliegue de infraestructura con Terraform
  # ---------------------------------------------------------------------------
  terraform-deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
 # AÑADE ESTE BLOQUE ENV:
    env:
      TF_VAR_rapidapi_key: ${{ secrets.RAPIDAPI_KEY }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Generar Lambda zip
        run: |
          mkdir -p build
          zip -r build/lambda_placeholder.zip src/lambda/ src/shared/

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: |
          cd infra
          terraform init

      - name: Terraform Plan
        run: |
          cd infra
          terraform plan -out=tfplan

      - name: Terraform Apply
        run: |
          cd infra
          terraform apply -auto-approve tfplan

  # ---------------------------------------------------------------------------
  # JOB 2: Construir y subir imagen Docker a ECR
  # ---------------------------------------------------------------------------
  docker-deploy:
    name: Docker Deploy
    runs-on: ubuntu-latest
    needs: terraform-deploy
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login en ECR
        run: |
          aws ecr get-login-password --region eu-west-1 | \
          docker login --username AWS --password-stdin \
          380894354766.dkr.ecr.eu-west-1.amazonaws.com

      - name: Construir imagen Docker
        run: docker build -t yt-mp3-api-worker .

      - name: Tag y Push a ECR
        run: |
          docker tag yt-mp3-api-worker:latest \
            380894354766.dkr.ecr.eu-west-1.amazonaws.com/yt-mp3-api-worker:latest
          docker push \
            380894354766.dkr.ecr.eu-west-1.amazonaws.com/yt-mp3-api-worker:latest
